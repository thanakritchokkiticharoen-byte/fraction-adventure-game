services:
  - type: web
    name: fraction-adventure-game
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_GAME_URL
        value: https://fraction-adventure-game.onrender.com
      - key: GOOGLE_FORM_URL
        value: https://forms.gle/CHANGE_ME
